# Example live-provider configuration for local integration validation.
# Credentials stay in environment variables, not in this file.

environment = "local"

[llm]
provider = "openai"
model = "gpt-4.1-mini"
api_key_env_var = "OPENAI_API_KEY"
temperature = 0.0

[market_data]
provider = "yahoo"

[news]
provider = "yahoo"

[portfolio]
provider = "robinhood"
account_id = "default"
robinhood_session_cache_path = ".robinhood-session/robinhood.pickle"
robinhood_username_env_var = "ROBINHOOD_USERNAME"
robinhood_password_env_var = "ROBINHOOD_PASSWORD"
robinhood_session_token_env_var = "ROBINHOOD_SESSION_TOKEN"

[sec]
provider = "edgar"
user_agent_env_var = "SEC_USER_AGENT"

[macro]
provider = "fred"
fred_api_key_env_var = "FRED_API_KEY"

[email]
provider = "gmail"
gmail_credentials_path_env_var = "GOOGLE_APPLICATION_CREDENTIALS"
gmail_token_path_env_var = "PARAKEETNEST_GMAIL_TOKEN_PATH"
